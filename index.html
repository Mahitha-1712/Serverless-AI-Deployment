<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4CAF50;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 20px;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Prediction Dashboard</h1>

    <label>f1:</label>
    <input id="f1" value="5.1">

    <label>f2:</label>
    <input id="f2" value="3.5">

    <label>f3:</label>
    <input id="f3" value="1.4">

    <label>f4:</label>
    <input id="f4" value="0.2">

    <button onclick="predict()">Predict</button>

    <h2 id="result"></h2>
</div>

<script>
    const apiUrl = "https://p52l1jzyv4.execute-api.us-east-1.amazonaws.com/predict";

    function predict() {
        const data = {
            f1: parseFloat(document.getElementById("f1").value),
            f2: parseFloat(document.getElementById("f2").value),
            f3: parseFloat(document.getElementById("f3").value),
            f4: parseFloat(document.getElementById("f4").value)
        };

        fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            document.getElementById("result").innerText =
                "Prediction: " + res.prediction;
        })
        .catch(err => {
            document.getElementById("result").innerText =
                "Error: " + err;
        });
    }
</script>

</body>
</html>
